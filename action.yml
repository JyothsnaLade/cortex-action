name: Cortex Code Review
description: Send PR info to Cortex backend

inputs:
  backend-url:
    description: Pervaziv backend URL
    required: false
    default: 'https://console.pervaziv.com:8443/handleGitAction'
  console-url:
    description: Pervaziv console URL
    required: false
    default: 'https://console.pervaziv.com'

runs:
  using: node20
  main: dist/index.js